name: Daily internship scout

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 07:00 London / 09:00 Athens in summer
  workflow_dispatch:        # adds a "Run workflow" button for manual test runs

permissions:
  contents: write           # lets the job commit seen.json back to the repo

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run the agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python agent.py

      - name: Publish results
        run: |
          git config user.name "internship-agent"
          git config user.email "agent@users.noreply.github.com"
          git add seen.json matches.json docs/
          git diff --staged --quiet || (git commit -m "Update matches [skip ci]" && git push)
